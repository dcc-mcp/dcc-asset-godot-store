tools:
  - name: search_godot_assets
    description: Search the Godot Asset Store for reusable assets, addons, and projects.
    source_file: scripts/search_godot_assets.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: godot_asset_store
    input_schema:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 25
          default: 10
    output_schema:
      type: object
      required: [success, context]

  - name: inspect_godot_asset
    description: Inspect Godot Asset Store metadata and available package versions.
    source_file: scripts/inspect_godot_asset.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: godot_asset_store
    input_schema:
      type: object
      required: [publisher, slug]
      properties:
        publisher:
          type: string
        slug:
          type: string
    output_schema:
      type: object
      required: [success, context]

  - name: download_godot_asset
    description: Download a free Godot Asset Store package after explicit terms acceptance.
    source_file: scripts/download_godot_asset.py
    execution: sync
    affinity: any
    timeout_hint_secs: 180
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: godot_asset_store
    input_schema:
      type: object
      required: [publisher, slug, output_dir, accept_terms]
      properties:
        publisher:
          type: string
        slug:
          type: string
        output_dir:
          type: string
        accept_terms:
          type: boolean
          description: Confirm acceptance of the Godot Asset Store terms for this download.
        version:
          type: string
          description: Exact asset version. Defaults to the newest compatible version.
        godot_version:
          type: string
          description: Godot version used to filter compatible packages, for example 4.4.
    output_schema:
      type: object
      required: [success, context]
      properties:
        context:
          type: object
          required: [package]
          properties:
            package:
              type: object
              required: [asset_id, archive_path, sha256, package_type, source_url]
